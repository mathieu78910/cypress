on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Sauvegarde du cache
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            .next
            /home/runner/.cache/Cypress
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Récupération du cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        browser: [chrome, edge]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Récupération du cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .next
            /home/runner/.cache/Cypress
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - uses: cypress-io/github-action@v7
        with:
          install: false
          start: npm run start
          browser: ${{ matrix.browser }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cypress-videos-${{ matrix.browser }}
          path: cypress/videos
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: cypress/screenshots

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    env:
      PROJECT_DIR: ~/with-cypress-app
      PM2_APP_NAME: with-cypress-app
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            set -e
            cd ${PROJECT_DIR}
            git fetch --all
            git checkout ${GITHUB_REF_NAME}
            git pull --ff-only origin ${GITHUB_REF_NAME}
            npm ci
            npm run build
            pm2 restart ${PM2_APP_NAME} || pm2 start npm --name ${PM2_APP_NAME} -- start
            pm2 save
          "
