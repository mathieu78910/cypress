name: Test workflow

on:
  push:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Save node_modules cache
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Restore Cypress binary cache
        id: cache-cypress
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-binary-${{ hashFiles('package-lock.json') }}

      - name: Install Cypress binary (if cache miss)
        if: steps.cache-cypress.outputs.cache-hit != 'true'
        run: npx cypress install

      - name: Save Cypress binary cache
        if: steps.cache-cypress.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-binary-${{ hashFiles('package-lock.json') }}

      - name: Build app
        run: npm run build

      - name: Save Next build output
        uses: actions/cache/save@v4
        with:
          path: .next
          key: ${{ runner.os }}-next-${{ github.sha }}

  e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore Cypress binary cache
        id: cache-cypress
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-binary-${{ hashFiles('package-lock.json') }}

      - name: Install Cypress binary (if cache miss)
        if: steps.cache-cypress.outputs.cache-hit != 'true'
        run: npx cypress install

      - name: Restore Next build output
        id: cache-next
        uses: actions/cache/restore@v4
        with:
          path: .next
          key: ${{ runner.os }}-next-${{ github.sha }}

      - name: Run Cypress E2E
        uses: cypress-io/github-action@v7
        with:
          install: false
          start: npm run start
          wait-on: "http://localhost:3000"
